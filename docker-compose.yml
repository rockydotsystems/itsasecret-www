services:
  postgres:
    image: postgres:17
    container_name: itsasecret-postgres
    environment:
      POSTGRES_USER: itsasecret
      POSTGRES_PASSWORD: itsasecret
      POSTGRES_DB: itsasecret
    ports:
      - "5432:5432"
    volumes:
      - itsasecret_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U itsasecret -d itsasecret"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  itsasecret_pgdata:
